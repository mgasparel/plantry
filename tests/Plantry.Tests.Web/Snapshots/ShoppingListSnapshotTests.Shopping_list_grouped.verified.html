<div id="shopping-list">
	<div class="sl-group" aria-label="Dairy">
		<div class="sl-group-head">
			<span class="cdot" style="background: var(--color-text-faint)" aria-hidden="true"></span>
			<h3>Dairy</h3>
			<span class="count">1</span>
			<span class="spacer"></span>
		</div>
		<div class="sl-rows">
			<div class="sl-item" id="shopping-item-Guid_1">
				<button type="button" class="sl-check" hx-post="/Shopping?listId=Guid_2&amp;itemId=Guid_1&amp;handler=CheckOff" hx-target="#shopping-list" hx-swap="outerHTML" aria-label="Check off Milk">
					<svg class="icon" aria-hidden="true">
						<use href="#i-check"></use>
					</svg>
				</button>
				<div class="sl-body">
					<div class="sl-name">
						Milk
					</div>
				</div>
				<span class="sl-qty">
					2 L
				</span>
				<div class="sl-actions" aria-label="Item actions">
				</div>
			</div>
		</div>
	</div>
	<div class="sl-group" aria-label="Uncategorized">
		<div class="sl-group-head">
			<svg class="icon" aria-hidden="true" style="color: var(--color-text-faint); width: 16px; height: 16px; flex: none">
				<use href="#i-tag"></use>
			</svg>
			<h3>Uncategorized</h3>
			<span class="count">1</span>
			<span class="spacer"></span>
		</div>
		<div class="sl-rows">
			<div class="sl-item" id="shopping-item-Guid_3">
				<button type="button" class="sl-check" hx-post="/Shopping?listId=Guid_2&amp;itemId=Guid_3&amp;handler=CheckOff" hx-target="#shopping-list" hx-swap="outerHTML" aria-label="Check off Sriracha">
					<svg class="icon" aria-hidden="true">
						<use href="#i-check"></use>
					</svg>
				</button>
				<div class="sl-body">
					<div class="sl-name">
						Sriracha
						<span class="free-tag">custom</span>
					</div>
				</div>
				<div class="sl-actions" aria-label="Item actions">
				</div>
			</div>
		</div>
	</div>
	<div class="sl-checked-head">
		<span class="lbl">
			<svg class="icon" aria-hidden="true">
				<use href="#i-check"></use>
			</svg>
			Checked off
		</span>
		<span class="spacer"></span>
		<form method="post" action="/Shopping?handler=ClearChecked">
			<input name="__RequestVerificationToken" type="hidden" value="{scrubbed-antiforgery-token}">
			<button type="submit" class="sl-clear">
				<svg class="icon" aria-hidden="true">
					<use href="#i-trash"></use>
				</svg>
				Clear 1 checked item
			</button>
		</form>
	</div>
	<div class="sl-group" aria-label="Checked items">
		<div class="sl-rows">
			<div class="sl-item done" id="shopping-item-Guid_4">
				<button type="button" class="sl-check on" hx-post="/Shopping?listId=Guid_2&amp;itemId=Guid_4&amp;handler=CheckOff" hx-target="#shopping-list" hx-swap="outerHTML" aria-label="Uncheck Flour">
					<svg class="icon" aria-hidden="true">
						<use href="#i-check"></use>
					</svg>
				</button>
				<div class="sl-body">
					<div class="sl-name">
						Flour
					</div>
				</div>
				<span class="sl-qty">
					500 L
				</span>
				<div class="sl-actions" aria-label="Item actions">
				</div>
			</div>
		</div>
	</div>
</div>
