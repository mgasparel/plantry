<div id="shopping-list">
	<div class="shopping-list__actions">
		<form method="post" action="/Shopping?handler=ClearChecked">
			<input name="__RequestVerificationToken" type="hidden" value="{scrubbed-antiforgery-token}">
			<button type="submit" class="btn btn--ghost btn--sm">
				Clear 1 checked item
			</button>
		</form>
	</div>
	<section class="shopping-group" aria-label="Dairy">
		<h3 class="shopping-group__heading">Dairy</h3>
		<ul class="shopping-group__items" role="list">
			<li class="shopping-item" id="shopping-item-Guid_1">
				<label class="shopping-item__check-label" aria-label="Uncheck Milk">
					<input type="checkbox" class="shopping-item__checkbox" hx-post="/Shopping?listId=Guid_2&amp;itemId=Guid_1&amp;handler=CheckOff" hx-trigger="change" hx-target="#shopping-list" hx-swap="outerHTML">
				</label>
				<span class="shopping-item__name">Milk</span>
				<span class="shopping-item__qty">
					2&nbsp;L
				</span>
			</li>
		</ul>
	</section>
	<section class="shopping-group" aria-label="Uncategorized">
		<h3 class="shopping-group__heading">Uncategorized</h3>
		<ul class="shopping-group__items" role="list">
			<li class="shopping-item" id="shopping-item-Guid_3">
				<label class="shopping-item__check-label" aria-label="Uncheck Sriracha">
					<input type="checkbox" class="shopping-item__checkbox" hx-post="/Shopping?listId=Guid_2&amp;itemId=Guid_3&amp;handler=CheckOff" hx-trigger="change" hx-target="#shopping-list" hx-swap="outerHTML">
				</label>
				<span class="shopping-item__name">Sriracha</span>
			</li>
		</ul>
	</section>
	<section class="shopping-group shopping-group--checked" aria-label="Checked items">
		<h3 class="shopping-group__heading">Checked</h3>
		<ul class="shopping-group__items" role="list">
			<li class="shopping-item shopping-item--checked" id="shopping-item-Guid_4">
				<label class="shopping-item__check-label" aria-label="Checked Flour">
					<input type="checkbox" class="shopping-item__checkbox" checked="checked" hx-post="/Shopping?listId=Guid_2&amp;itemId=Guid_4&amp;handler=CheckOff" hx-trigger="change" hx-target="#shopping-list" hx-swap="outerHTML">
				</label>
				<span class="shopping-item__name">Flour</span>
				<span class="shopping-item__qty">
					500&nbsp;L
				</span>
			</li>
		</ul>
	</section>
</div>
