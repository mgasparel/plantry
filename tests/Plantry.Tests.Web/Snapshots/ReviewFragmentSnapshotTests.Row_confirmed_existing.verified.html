<div id="import-line-Guid_1" class="import-row import-row--confirmed" x-data="{&quot;open&quot;:false,&quot;createNew&quot;:false,&quot;selectedProductId&quot;:&quot;Guid_2&quot;,&quot;skuId&quot;:&quot;&quot;,&quot;skus&quot;:{},&quot;v&quot;:12,&quot;d&quot;:&quot;2026-07-01&quot;}" :class="{ 'import-row--open': open }" data-status="ready" x-show="filter === 'all' || filter === 'ready'">
	<div class="import-row__main">
		<div class="cat-chip cat-chip--neutral">?</div>
		<div class="import-row__id">
			<div class="import-row__name">
				<span class="import-row__product">Eggs</span>
			</div>
			<div class="import-row__raw">
				<span class="import-row__raw-tag">receipt</span>
				<span>FREE RANGE EGGS</span>
			</div>
		</div>
		<div class="import-row__meta">
			<div class="import-row__meta-cell">
				<div class="import-row__meta-value">12<span class="import-row__meta-unit">
						ea</span>
				</div>
				<div class="import-row__meta-label">qty</div>
			</div>
			<div class="import-row__meta-cell">
				<div class="import-row__meta-value">$4.50</div>
				<div class="import-row__meta-label">price</div>
			</div>
			<div class="import-row__meta-cell">
				<div class="import-row__meta-value">1 Jul</div>
				<div class="import-row__meta-label">expires</div>
			</div>
			<div class="import-row__conf">
				<span class="badge badge-confidence--high" title="Matched a catalog product with high confidence">
					<svg class="icon" aria-hidden="true">
						<use href="#i-check"></use>
					</svg>
					Matched
				</span>
			</div>
		</div>
		<div class="import-row__act">
			<span class="import-row__confirmed-flag">
				<svg class="icon" aria-hidden="true">
					<use href="#i-check"></use>
				</svg>
				Matched
			</span>
			<button type="button" class="import-row__toggle" @click="open = !open" :aria-expanded="open" aria-label="Edit line">
				<svg class="icon import-row__chev" :class="{ 'import-row__chev--open': open }" aria-hidden="true">
					<use href="#i-chevron"></use>
				</svg>
			</button>
		</div>
	</div>
	<div class="import-row__edit review-row__edit" x-show="open" x-cloak="">
		<form hx-post="/Intake/Review/Guid_3?handler=SaveLine" hx-target="#import-line-Guid_1" hx-swap="outerHTML">
			<input name="__RequestVerificationToken" type="hidden" value="{scrubbed-antiforgery-token}">
			<input type="hidden" name="Id" value="Guid_3">
			<input type="hidden" name="Edit.LineId" value="Guid_1">
			<input type="hidden" name="Edit.CreateNew" :value="createNew" x-ref="createNew">
			<div class="import-row__edit-grid">
				<div class="form-grid__field form-grid__field--full" x-show="!createNew">
					<label class="form-grid__field__label">Product</label>
					<div class="form-grid__field__control">
						<div class="searchable-select" x-data="searchableSelect()" data-initial-label="Eggs" @click.outside="open = false" @keydown.escape="open = false" @alt-selected.window="if($event.detail.lineId === 'Guid_1') select($event.detail.id, $event.detail.label)">
							<input type="hidden" name="Edit.ProductId" value="Guid_2" x-ref="hidden" @change="selectedProductId = $event.target.value; skuId = ''">
							<div class="searchable-select__control">
								<input type="text" class="field__input" role="combobox" aria-controls="edit-product-Guid_1-listbox" aria-autocomplete="list" autocomplete="off" placeholder="Find a product…" x-model="query" :aria-expanded="open" @focus="open = true" @keydown.down.prevent="highlightNext()" @keydown.up.prevent="highlightPrev()" @keydown.enter.prevent="chooseHighlighted()" name="q" hx-get="/Intake/Review/Guid_3?handler=FilterProducts" hx-trigger="keyup changed delay:250ms, focus" hx-target="#edit-product-Guid_1-listbox" hx-swap="innerHTML" hx-params="q">
							</div>
							<ul class="searchable-select__listbox" id="edit-product-Guid_1-listbox" role="listbox" x-ref="listbox" x-show="open" x-cloak="" style="display: none">
								<li role="option" data-value="Guid_4" @click="select($el.dataset.value, $el.textContent.trim())">Milk</li>
								<li role="option" data-value="Guid_5" @click="select($el.dataset.value, $el.textContent.trim())">Bread</li>
								<li role="option" data-value="Guid_2" @click="select($el.dataset.value, $el.textContent.trim())">Eggs</li>
								<li role="option" data-value="Guid_6" @click="select($el.dataset.value, $el.textContent.trim())">Cheddar, Mild</li>
								<li role="option" data-value="Guid_7" @click="select($el.dataset.value, $el.textContent.trim())">Cheddar, Sharp</li>
								<li role="option" data-value="Guid_8" @click="select($el.dataset.value, $el.textContent.trim())">Cheddar, Marble</li>
							</ul>
						</div>
					</div>
				</div>
				<div class="form-grid__field" style="grid-column: span 3" x-show="createNew">
					<label class="form-grid__field__label">New product name</label>
					<div class="form-grid__field__control">
						<input class="field__input" name="Edit.NewProductName" value="" placeholder="FREE RANGE EGGS">
					</div>
				</div>
				<div class="form-grid__field" x-show="createNew">
					<label class="form-grid__field__label">Category</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.NewProductCategoryId">
							<option value="">— Category —</option>
							<option value="Guid_9">Dairy</option>
						</select>
					</div>
				</div>
				<div class="form-grid__field form-grid__field--full" x-show="!createNew &amp;&amp; (skus[selectedProductId]?.length ?? 0) > 0" x-cloak="">
					<label class="form-grid__field__label">Pack size (optional)</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.SkuId" x-model="skuId">
							<option value="">— Any size —</option>
							<template x-for="sku in (skus[selectedProductId] ?? [])" :key="sku.id"><option :value="sku.id" x-text="sku.label"></option></template>
						</select>
					</div>
				</div>
				<div class="review-row__mode-toggle">
					<button type="button" class="btn btn--ghost btn--sm" x-show="!createNew" @click="createNew = true">+ Add as new product</button>
					<button type="button" class="btn btn--ghost btn--sm" x-show="createNew" @click="createNew = false">← Use existing product</button>
				</div>
				<div class="form-grid__field" style="grid-column: span 2">
					<label class="form-grid__field__label">Quantity</label>
					<div class="form-grid__field__control">
						<div class="qty-stepper">
							<button type="button" class="qty-btn" @click="v = Math.max(0.001, (parseFloat(v)||0) - 1)" aria-label="Decrease">
								<svg class="icon" aria-hidden="true">
									<use href="#i-minus"></use>
								</svg>
							</button>
							<input class="field__input" type="number" step="any" min="0" name="Edit.Quantity" x-model="v">
							<button type="button" class="qty-btn" @click="v = (parseFloat(v)||0) + 1" aria-label="Increase">
								<svg class="icon" aria-hidden="true">
									<use href="#i-plus"></use>
								</svg>
							</button>
						</div>
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Location</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.LocationId">
							<option value="">— Location —</option>
							<option value="Guid_10" selected="selected">Fridge</option>
						</select>
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Expires</label>
					<div class="form-grid__field__control">
						<div class="qty-stepper" x-init="adj = function(n) { if(!d){let t=new Date();t.setDate(t.getDate()+n);d=t.toISOString().slice(0,10);return;} let t=new Date(d+'T12:00');t.setDate(t.getDate()+n);d=t.toISOString().slice(0,10); }">
							<button type="button" class="qty-btn" @click="adj(-1)" aria-label="Earlier">
								<svg class="icon" aria-hidden="true">
									<use href="#i-minus"></use>
								</svg>
							</button>
							<input class="field__input" type="date" name="Edit.ExpiryDate" x-model="d">
							<button type="button" class="qty-btn" @click="adj(1)" aria-label="Later">
								<svg class="icon" aria-hidden="true">
									<use href="#i-plus"></use>
								</svg>
							</button>
						</div>
					</div>
				</div>
				<input type="hidden" name="Edit.Price" value="4.5">
				<div class="form-grid__field" style="grid-column: span 4">
					<label class="form-grid__field__label">Unit</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.UnitId">
							<option value="">— Unit —</option>
							<option value="Guid_11" selected="selected">ea — Each</option>
							<option value="Guid_12">L — Litre</option>
						</select>
					</div>
				</div>
			</div>
			<div class="import-row__edit-foot">
				<div class="import-row__edit-foot-summary">
					<svg class="icon" aria-hidden="true">
						<use href="#i-location"></use>
					</svg>
					Goes to
					<strong>Fridge</strong>
				</div>
				<span class="import-row__edit-spacer"></span>
				<button type="button" class="btn btn--ghost btn--sm import-row__edit-danger" hx-post="/Intake/Review/Guid_3?lineId=Guid_1&amp;handler=DismissLine" hx-target="#import-line-Guid_1" hx-swap="outerHTML">
					Not pantry stock — remove
				</button>
				<button type="submit" class="btn btn--primary btn--sm">
					<svg class="icon" aria-hidden="true">
						<use href="#i-check"></use>
					</svg>
					Confirm item
				</button>
			</div>
		</form>
	</div>
</div>
