<div class="rd-meta" role="list" aria-label="Recipe stats">
	<div class="rd-meta__cell" role="listitem">
		<div class="rd-meta__ico" aria-hidden="true">
			<svg class="icon">
				<use href="#i-clock"></use>
			</svg>
		</div>
		<div class="rd-meta__body">
			<div class="rd-meta__val">
				30 min
			</div>
			<div class="rd-meta__lbl">Cook time</div>
		</div>
	</div>
	<div class="rd-meta__cell" role="listitem">
		<div class="rd-meta__ico" aria-hidden="true">
			<svg class="icon">
				<use href="#i-servings"></use>
			</svg>
		</div>
		<div class="rd-meta__body">
			<div class="rd-meta__val">
				<span x-text="servings + (servings === 1 ? ' serving' : ' servings')">4 servings</span>
			</div>
			<div class="rd-meta__lbl">
				Yields<span x-show="scale !== 1" x-cloak="">
					·&nbsp;scaled
					<span x-text="Math.round(scale * 100) / 100"></span>×
				</span>
			</div>
		</div>
	</div>
	<div class="rd-meta__cell" role="listitem">
		<div class="rd-meta__ico" aria-hidden="true">
			<svg class="icon">
				<use href="#i-tag"></use>
			</svg>
		</div>
		<div class="rd-meta__body">
			<div class="rd-meta__val rd-meta__val--mono">
				$0.39
				<span class="rd-meta__flag">
					<span class="popover popover--below popover--end">
						<button type="button" class="popover__trigger" aria-label="~" aria-describedby="popover-1">~</button>
						<span class="popover__content" id="popover-1" role="tooltip">
							<span class="pop-kicker">Partial estimate</span>
							<span class="pop-body">
								<b>1 ingredient</b>
								isn't priced yet, so the real cost is higher. Set its price to complete it:</span>
							<ul class="pop-rows">
								<li>
									<a href="/Pantry/Products/Guid_1">
										Garlic Cloves
										<svg class="icon" aria-hidden="true">
											<use href="#i-chevron-right"></use>
										</svg>
									</a>
								</li>
							</ul>
						</span>
					</span>
				</span>
			</div>
			<div class="rd-meta__lbl">
				Per serving&nbsp;·&nbsp;$1.55 total
			</div>
		</div>
	</div>
</div>
