<div class="card">
	<div class="card__head">
		<div>
			<h3 class="card__head-title">Ingredients</h3>
			<p class="card__head-sub">Drag rows to reorder. Search for a product or create a new staple if nothing matches.</p>
		</div>
	</div>
	<div class="card__body" style="padding:0">
		<div id="ingredient-rows">
			<template x-for="(row, idx) in rows" :key="row.ordinal"><div class="ingredient-row" :class="{ 'ingredient-row--needs-conversion': row.needsConversion }" draggable="true" @dragstart.self="dragStart(idx)" @dragover.prevent="dragOver(idx)" @drop="drop()" @pick-product="selectProduct(row, $event.detail)">
					<input type="hidden" :name="'Input.Lines[' + idx + '].Ordinal'" :value="row.ordinal">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ProductId'" :value="row.productId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleName'" :value="row.newStapleName ?? ''">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleDefaultUnitId'" :value="row.newStapleUnit">
					<input type="hidden" :name="'Input.Lines[' + idx + '].Quantity'" :value="row.qty">
					<input type="hidden" :name="'Input.Lines[' + idx + '].UnitId'" :value="row.unitId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].GroupHeading'" :value="row.groupHeading">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionFactor'" :value="row.conversionFactor">
					<div class="ingredient-row__body">
						<div class="ingredient-row__drag" aria-hidden="true" title="Drag to reorder" style="cursor:grab;color:var(--color-text-muted);padding:var(--space-2);display:flex;align-items:center">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
								<line x1="3" y1="8" x2="21" y2="8"></line>
								<line x1="3" y1="16" x2="21" y2="16"></line>
							</svg>
						</div>
						<div class="ingredient-row__product" style="flex:2;min-width:0">
							<div x-show="row.newStapleName === null">
								<div class="searchable-select" x-data="searchableSelect()" :data-initial-label="row.productName" @click.outside="open = false" @keydown.escape="open = false">
									<input type="text" class="field__input" role="combobox" autocomplete="off" placeholder="Search products…" x-model="query" :aria-expanded="open" @focus="open = true" @keydown.down.prevent="highlightNext()" @keydown.up.prevent="highlightPrev()" @keydown.enter.prevent="(function(){ const li = $refs.listbox &amp;&amp; ($refs.listbox.querySelector('[aria-selected=true]') || $refs.listbox.querySelector('li')); if (li) li.click(); })()" name="q" :id="'prod-search-' + idx" hx-get="/Recipes/New?handler=SearchProducts" hx-trigger="keyup changed delay:250ms, focus" :hx-target="'#prod-list-' + idx" hx-swap="innerHTML" hx-params="q" @htmx:after-swap="open = true">
									<ul class="searchable-select__listbox" :id="'prod-list-' + idx" role="listbox" x-ref="listbox" x-show="open" x-cloak="" style="display:none">
									</ul>
								</div>
								<div x-show="!row.productId" style="margin-top:var(--space-1)">
									<button type="button" class="btn btn--ghost btn--sm" @click="row.newStapleName = row.productId || ''">
										+ Create as staple (untracked)
									</button>
								</div>
							</div>
							<div x-show="row.newStapleName !== null" style="display:flex;gap:var(--space-2);align-items:center;flex-wrap:wrap">
								<input type="text" class="field__input" placeholder="Staple name (e.g. Salt)" x-model="row.newStapleName" style="flex:1;min-width:8rem">
								<select class="field__input" x-model="row.newStapleUnit" style="min-width:5rem">
									<option value="">unit</option>
									<option value="Guid_1">g</option>
									<option value="Guid_2">ea</option>
								</select>
								<button type="button" class="btn btn--ghost btn--sm" @click="row.newStapleName = null; row.productId = ''; row.newStapleUnit = ''">
									← Search instead
								</button>
							</div>
						</div>
						<div class="ingredient-row__qty" x-show="!row.isUntracked &amp;&amp; row.newStapleName === null" style="display:flex;gap:var(--space-2);align-items:center;flex-shrink:0">
							<input type="number" class="field__input" step="any" min="0" placeholder="Qty" x-model="row.qty" style="width:5rem;text-align:center">
							<select class="field__input" x-model="row.unitId" style="min-width:5rem">
								<option value="">unit</option>
								<option value="Guid_1">g</option>
								<option value="Guid_2">ea</option>
							</select>
						</div>
						<div class="ingredient-row__group" style="flex:1;min-width:0">
							<input type="text" class="field__input" placeholder="Group (optional)" x-model="row.groupHeading" style="font-size:var(--font-size-sm)">
						</div>
						<button type="button" class="btn btn--ghost btn--sm" aria-label="Remove ingredient" @click="removeRow(idx)" style="flex-shrink:0;color:var(--color-danger)">
							<svg class="icon" aria-hidden="true">
								<use href="#i-minus"></use>
							</svg>
						</button>
					</div>
					<div x-show="row.needsConversion" class="ingredient-row__conversion" style="background:var(--color-warning-bg);border-top:1px solid var(--color-warning);padding:var(--space-3) var(--space-4)">
						<p style="font-size:var(--font-size-sm);margin:0 0 var(--space-2)">
							No conversion path found. Enter the factor from your chosen unit to the product's default unit:
						</p>
						<div style="display:flex;align-items:center;gap:var(--space-2)">
							<input type="number" class="field__input" step="any" min="0" placeholder="Conversion factor" x-model="row.conversionFactor" style="width:10rem">
							<span style="font-size:var(--font-size-sm);color:var(--color-text-muted)">
								× (your unit) = 1 × (product default unit)
							</span>
						</div>
					</div>
				</div></template>
		</div>
		<div style="padding:var(--space-4)">
			<button type="button" class="btn btn--ghost btn--sm" @click="addRow()">
				<svg class="icon" aria-hidden="true">
					<use href="#i-plus"></use>
				</svg>
				Add ingredient
			</button>
		</div>
	</div>
</div>
