<div class="card">
	<div class="card__head">
		<div>
			<h3 class="card__head-title">Ingredients</h3>
			<p class="card__head-sub">Add ingredients one at a time. Click a row to edit it, or drag to reorder.</p>
		</div>
	</div>
	<div class="card__body" style="padding:0">
		<div id="ingredient-rows">
			<template x-for="(row, idx) in rows" :key="row.ordinal"><div class="ingredient-row" :class="{ 'ingredient-row--needs-conversion': row.needsConversion }" draggable="true" @dragstart.self="dragStart(idx)" @dragover.prevent="dragOver(idx)" @drop="drop()">
					<input type="hidden" :name="'Input.Lines[' + idx + '].Ordinal'" :value="row.ordinal">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ProductId'" :value="row.productId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ProductName'" :value="row.productName">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleName'" :value="row.newStapleName ?? ''">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleDefaultUnitId'" :value="row.newStapleUnit">
					<input type="hidden" :name="'Input.Lines[' + idx + '].Quantity'" :value="row.qty">
					<input type="hidden" :name="'Input.Lines[' + idx + '].UnitId'" :value="row.unitId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].GroupHeading'" :value="row.groupHeading">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionFactor'" :value="row.conversionFactor">
					<div class="ingredient-row__body">
						<div class="ingredient-row__drag" aria-hidden="true" title="Drag to reorder">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
								<line x1="3" y1="8" x2="21" y2="8"></line>
								<line x1="3" y1="16" x2="21" y2="16"></line>
							</svg>
						</div>
						<button type="button" class="ingredient-row__summary" @click="openEdit(idx)" :title="'Edit ' + (row.newStapleName || row.productName)">
							<span x-text="rowSummary(row)"></span>
						</button>
						<button type="button" class="btn btn--ghost btn--sm ingredient-row__action" aria-label="Edit ingredient" @click="openEdit(idx)">
							<svg class="icon" aria-hidden="true">
								<use href="#i-edit"></use>
							</svg>
						</button>
						<button type="button" class="btn btn--ghost btn--sm ingredient-row__action" aria-label="Remove ingredient" @click="removeRow(idx)" style="color:var(--color-danger)">
							<svg class="icon" aria-hidden="true">
								<use href="#i-minus"></use>
							</svg>
						</button>
					</div>
					<div x-show="row.needsConversion" class="ingredient-row__conversion" style="background:var(--color-warning-bg);border-top:1px solid var(--color-warning);padding:var(--space-3) var(--space-4)">
						<p style="font-size:var(--font-size-sm);margin:0 0 var(--space-2)">
							No conversion path found. Enter the factor from your chosen unit to the product's default unit:
						</p>
						<div style="display:flex;align-items:center;gap:var(--space-2)">
							<input type="number" class="field__input" step="any" min="0" placeholder="Conversion factor" x-model="row.conversionFactor" style="width:10rem">
							<span style="font-size:var(--font-size-sm);color:var(--color-text-muted)">
								× (your unit) = 1 × (product default unit)
							</span>
						</div>
					</div>
				</div></template>
		</div>
		<div x-show="rows.length === 0" style="padding:var(--space-4);color:var(--color-text-muted);font-size:var(--font-size-sm)">
			No ingredients yet — add your first one below.
		</div>
		<div style="padding:var(--space-4)">
			<button type="button" class="btn btn--ghost btn--sm" @click="openAdd()">
				<svg class="icon" aria-hidden="true">
					<use href="#i-plus"></use>
				</svg>
				Add ingredient
			</button>
		</div>
	</div>
</div>
