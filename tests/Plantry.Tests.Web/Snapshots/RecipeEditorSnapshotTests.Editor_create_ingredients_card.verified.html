<div class="card card--overflow-visible">
	<div class="card__head">
		<div>
			<h3 class="card__head-title">Ingredients</h3>
			<p class="card__head-sub">Group into sections like “For the sauce” — set an ingredient’s
				<strong>Section</strong>
				in its add/edit form to start one. Drag a row to reorder it, or across a section to move it. Rename a section heading once to rename it for every ingredient in it.</p>
		</div>
	</div>
	<div class="card__body" style="padding:0">
		<div hidden="" aria-hidden="true">
			<template x-for="(row, idx) in ingredientRows()" :key="row._id"><div>
					<input type="hidden" :name="'Input.Lines[' + idx + '].Ordinal'" :value="row.ordinal">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ProductId'" :value="row.productId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ProductName'" :value="row.productName">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleName'" :value="row.newStapleName ?? ''">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleDefaultUnitId'" :value="row.newStapleUnit">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewIsTracked'" :value="row.newIsTracked">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewGroupId'" :value="row.newGroupId ?? ''">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewGroupName'" :value="row.newGroupName ?? ''">
					<input type="hidden" :name="'Input.Lines[' + idx + '].NewStapleCategoryId'" :value="row.newStapleCategoryId ?? ''">
					<input type="hidden" :name="'Input.Lines[' + idx + '].Quantity'" :value="row.qty">
					<input type="hidden" :name="'Input.Lines[' + idx + '].UnitId'" :value="row.unitId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].IsUntracked'" :value="row.isUntracked">
					<input type="hidden" :name="'Input.Lines[' + idx + '].GroupHeading'" :value="row.groupHeading">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionFactor'" :value="row.conversionFactor">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionLeftAmount'" :value="row.convLeftAmount">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionLeftUnitId'" :value="row.convLeftUnitId">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionRightAmount'" :value="row.convRightAmount">
					<input type="hidden" :name="'Input.Lines[' + idx + '].ConversionRightUnitId'" :value="row.convRightUnitId">
				</div></template>
			<template x-for="(inc, jdx) in inclusionRows()" :key="inc._id"><div>
					<input type="hidden" :name="'Input.Inclusions[' + jdx + '].Ordinal'" :value="inc.ordinal">
					<input type="hidden" :name="'Input.Inclusions[' + jdx + '].SubRecipeId'" :value="inc.subRecipeId">
					<input type="hidden" :name="'Input.Inclusions[' + jdx + '].SubName'" :value="inc.subName">
					<input type="hidden" :name="'Input.Inclusions[' + jdx + '].Servings'" :value="inc.servings">
					<input type="hidden" :name="'Input.Inclusions[' + jdx + '].SubDefaultServings'" :value="inc.subDefaultServings">
					<input type="hidden" :name="'Input.Inclusions[' + jdx + '].GroupHeading'" :value="inc.groupHeading">
				</div></template>
		</div>
		<div id="ingredient-rows" :class="{ 'ingredient-sections--dragging': _dragActive }">
			<template x-for="section in sections()" :key="section.key"><div class="ing-section" @dragover.prevent="onDragOver(section, $event)" @drop.prevent="onDragEnd()">
					<div class="ing-section__head" x-show="!section.isUngrouped || showUngroupedHeader()">
						<template x-if="section.isUngrouped"><span class="ing-section__name ing-section__name--ungrouped" title="Ingredients with no section">Ungrouped</span></template>
						<template x-if="!section.isUngrouped"><input class="ing-section__name" type="text" :value="section.heading" title="Rename this section — every ingredient in it follows" aria-label="Section heading" @change="renameSection(section.heading, $event.target.value)" @keydown.enter.prevent="$event.target.blur()"></template>
						<span class="ing-section__count" x-text="section.items.length + (section.items.length === 1 ? ' item' : ' items')"></span>
						<template x-if="!section.isUngrouped"><button type="button" class="ing-section__del" aria-label="Delete section" title="Delete section (its ingredients move to Ungrouped)" @click="deleteSection(section.heading)">
								<svg class="icon" aria-hidden="true">
									<use href="#i-minus"></use>
								</svg>
							</button></template>
					</div>
					<div class="ing-rows">
						<template x-for="row in section.items" :key="row._id"><div class="ingredient-row" :data-row-id="row._id" :id="row.kind === 'ingredient' ? 'ingredient-' + row.ordinal : null" :class="{ 'ingredient-row--needs-conversion': row.needsConversion &amp;&amp; !rowConvFilled(row), 'ingredient-row--needs-attention': rowNeedsQtyUnit(row), 'ingredient-row--dragging': row._id === _dragId }" draggable="true" @dragstart="onDragStart(row, $event)" @dragend="onDragEnd()">
								<template x-if="row.kind === 'inclusion'"><div class="ingredient-row__body">
										<div class="ingredient-row__drag" aria-hidden="true" title="Drag to reorder or move between sections">
											<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
												<line x1="3" y1="8" x2="21" y2="8"></line>
												<line x1="3" y1="16" x2="21" y2="16"></line>
											</svg>
										</div>
										<div class="incl-row__main">
											<div class="incl-row__title">
												<svg class="icon" aria-hidden="true">
													<use href="#i-recipe"></use>
												</svg>
												<span x-text="inclusionServingsLabel(row) + ' · ' + row.subName"></span>
											</div>
											<div class="incl-row__hint" x-show="batchHint(row)" x-cloak="" x-text="'≈ ' + batchHint(row)"></div>
										</div>
										<label class="incl-row__servings">
											<span class="incl-row__servings-lbl">Servings</span>
											<input type="number" min="0.25" step="0.25" class="field__input incl-row__servings-input" aria-label="Servings of the included recipe" x-model.number="row.servings">
										</label>
										<button type="button" class="btn btn--ghost btn--sm ingredient-row__action" aria-label="Remove included recipe" @click="removeRow(row)" style="color:var(--color-danger)">
											<svg class="icon" aria-hidden="true">
												<use href="#i-minus"></use>
											</svg>
										</button>
									</div></template>
								<template x-if="row.kind !== 'inclusion'"><div class="ingredient-row__body">
										<div class="ingredient-row__drag" aria-hidden="true" title="Drag to reorder or move between sections">
											<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
												<line x1="3" y1="8" x2="21" y2="8"></line>
												<line x1="3" y1="16" x2="21" y2="16"></line>
											</svg>
										</div>
										<button type="button" class="ingredient-row__summary" @click="openEdit(row)" :title="'Edit ' + (row.newStapleName || row.productName)">
											<span x-text="rowSummary(row)"></span>
										</button>
										<button type="button" class="btn btn--ghost btn--sm ingredient-row__action" aria-label="Edit ingredient" @click="openEdit(row)">
											<svg class="icon" aria-hidden="true">
												<use href="#i-edit"></use>
											</svg>
										</button>
										<button type="button" class="btn btn--ghost btn--sm ingredient-row__action" aria-label="Remove ingredient" @click="removeRow(row)" style="color:var(--color-danger)">
											<svg class="icon" aria-hidden="true">
												<use href="#i-minus"></use>
											</svg>
										</button>
									</div></template>
								<div x-show="rowNeedsQtyUnit(row)" class="ingredient-row__needs-qty" style="background:var(--color-warning-bg);border-top:1px solid var(--color-warning);padding:var(--space-3) var(--space-4)">
									<p style="font-size:var(--font-size-sm);margin:0;display:flex;align-items:center;gap:var(--space-2);color:var(--color-text)">
										<svg class="icon" aria-hidden="true">
											<use href="#i-alert"></use>
										</svg>
										<span>This ingredient is now stock-tracked and needs a quantity and unit.</span>
										<button type="button" class="btn btn--ghost btn--sm" @click="openEdit(row)">Add quantity</button>
									</p>
								</div>
								<div x-show="rowShowConversion(row)" x-init="maybeHydrateRowConversion(row)" class="ingredient-row__conversion" :class="rowConvFilled(row)
                                                ? 'ingredient-row__conversion--filled'
                                                : 'ingredient-row__conversion--missing'">
									<p x-show="row.defaultUnitMissing" x-cloak="" style="font-size:var(--font-size-sm);margin:0;display:flex;align-items:flex-start;gap:var(--space-2);color:var(--color-text)">
										<svg class="icon" aria-hidden="true" style="flex:none">
											<use href="#i-alert"></use>
										</svg>
										<span>
											<strong x-text="row.productName"></strong>
											has no stock unit set, so Plantry can't                                                     work out the conversion. Set a default unit for this product in your catalog first.
										</span>
									</p>
									<p x-show="!row.defaultUnitMissing &amp;&amp; row.recipeUnitMissing" x-cloak="" style="font-size:var(--font-size-sm);margin:0;display:flex;align-items:flex-start;gap:var(--space-2);color:var(--color-text)">
										<svg class="icon" aria-hidden="true" style="flex:none">
											<use href="#i-alert"></use>
										</svg>
										<span>
											The unit chosen for
											<strong x-text="row.productName"></strong>
											on this recipe line can't                                                     be resolved, so Plantry can't work out the conversion. Pick a different unit for this ingredient.
										</span>
									</p>
									<p x-show="!rowConvFilled(row) &amp;&amp; !row.defaultUnitMissing &amp;&amp; !row.recipeUnitMissing" style="font-size:var(--font-size-sm);margin:0 0 var(--space-2)">
										Plantry stocks
										<strong x-text="row.productName"></strong>
										in
										<strong x-text="row.defaultUnitCode"></strong>.                                                 How does 1
										<span x-text="unitLabel(row.unitId)"></span>
										relate?
									</p>
									<template x-if="!row.defaultUnitMissing &amp;&amp; !row.recipeUnitMissing"><div>
											<div class="conv-eq">
												<input type="number" class="field__input conv-eq__amount" step="any" min="0" placeholder="120" x-model="row.convLeftAmount" aria-label="Stock amount">
												<select class="field__input conv-eq__unit" x-model="row.convLeftUnitId" aria-label="Stock unit">
													<template x-for="u in (row.stockUnits || [])" :key="u.id"><option :value="u.id" x-text="u.code"></option></template>
												</select>
												<span class="conv-eq__op">=</span>
												<input type="number" class="field__input conv-eq__amount" step="any" min="0" placeholder="1" x-model="row.convRightAmount" aria-label="Recipe amount">
												<select class="field__input conv-eq__unit" x-model="row.convRightUnitId" aria-label="Recipe unit">
													<template x-for="u in (row.recipeUnits || [])" :key="u.id"><option :value="u.id" x-text="u.code"></option></template>
												</select>
											</div>
											<p x-show="rowConvFilled(row)" x-cloak="" style="margin:var(--space-2) 0 0;font-size:var(--font-size-sm);color:var(--color-success)">
												<span x-text="rowConversionEcho(row)"></span>
											</p>
										</div></template>
									<p x-show="rowConvFilled(row)" x-cloak="" style="margin:var(--space-1) 0 0;font-size:var(--font-size-sm);color:var(--color-text-muted)">
										Saved to your catalog when you save the recipe.
									</p>
								</div>
							</div></template>
					</div>
				</div></template>
		</div>
		<div x-show="rows.length === 0" style="padding:var(--space-4);color:var(--color-text-muted);font-size:var(--font-size-sm)">
			No ingredients yet — add your first one below.
		</div>
		<div style="padding:var(--space-4);display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:flex-start">
			<button type="button" class="btn btn--ghost btn--sm" @click="openAdd()">
				<svg class="icon" aria-hidden="true">
					<use href="#i-plus"></use>
				</svg>
				Add ingredient
			</button>
			<div class="incl-search-wrap" style="position:relative">
				<button type="button" class="btn btn--ghost btn--sm" @click="openInclusionSearch()">
					<svg class="icon" aria-hidden="true">
						<use href="#i-plus"></use>
					</svg>
					Include a recipe
				</button>
				<div x-show="inclusionSearchOpen" x-cloak="" @click.outside="closeInclusionSearch()" class="incl-search">
					<input type="text" x-ref="inclusionInput" x-model="inclusionQuery" @input="searchInclusions()" @keydown.escape="closeInclusionSearch()" placeholder="Search your recipes…" class="field__input" autocomplete="off">
					<div class="incl-search__results">
						<template x-if="inclusionResults.length === 0"><p class="incl-search__empty" x-text="inclusionQuery.trim() ? 'No matching recipes.' : 'Type to search your recipes.'"></p></template>
						<template x-for="hit in inclusionResults" :key="hit.id"><button type="button" class="incl-search__opt" @click="addInclusion(hit)">
								<span class="incl-search__opt-name" x-text="hit.name"></span>
								<span class="incl-search__opt-meta" x-text="hit.defaultServings + (hit.defaultServings === 1 ? ' serving' : ' servings')"></span>
							</button></template>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
