<div id="import-line-Guid_1" class="import-row import-row--unmatched" x-data="{&quot;open&quot;:true,&quot;createNew&quot;:false}">
	<div class="import-row__main">
		<div class="import-row__id">
			<div class="import-row__name">
				<span class="import-row__unrecognized">Unrecognized item</span>
			</div>
			<div class="import-row__raw">
				<span class="import-row__raw-tag">receipt</span>
				<span>MYSTERY ITEM XZ</span>
			</div>
		</div>
		<div class="import-row__meta">
			<div class="import-row__meta-cell">
				<div class="import-row__meta-value">—<span class="import-row__meta-unit">
					</span>
				</div>
				<div class="import-row__meta-label">qty</div>
			</div>
			<div class="import-row__meta-cell">
				<div class="import-row__meta-value">—</div>
				<div class="import-row__meta-label">price</div>
			</div>
			<div class="import-row__meta-cell">
				<div class="import-row__meta-value">—</div>
				<div class="import-row__meta-label">expires</div>
			</div>
			<div class="import-row__conf">
			</div>
		</div>
		<div class="import-row__act">
			<button type="button" class="import-row__toggle" @click="open = !open" :aria-expanded="open" aria-label="Edit line">
				<svg class="icon" aria-hidden="true">
					<use href="#i-components"></use>
				</svg>
			</button>
		</div>
	</div>
	<div class="import-row__edit review-row__edit" x-show="open" x-cloak="">
		<form hx-post="/Intake/Review/Guid_2?handler=SaveLine" hx-target="#import-line-Guid_1" hx-swap="outerHTML">
			<input name="__RequestVerificationToken" type="hidden" value="{scrubbed-antiforgery-token}">
			<input type="hidden" name="Id" value="Guid_2">
			<input type="hidden" name="Edit.LineId" value="Guid_1">
			<input type="hidden" name="Edit.CreateNew" :value="createNew" x-ref="createNew">
			<div class="review-row__mode seg-ctrl" role="group" aria-label="Resolution mode">
				<label class="seg-ctrl__item">
					<input type="radio" name="mode-Guid_1" :checked="!createNew" @change="createNew = false">
					<span>Existing product</span>
				</label>
				<label class="seg-ctrl__item">
					<input type="radio" name="mode-Guid_1" :checked="createNew" @change="createNew = true">
					<span>New product</span>
				</label>
			</div>
			<div class="import-row__edit-grid">
				<div class="form-grid__field form-grid__field--full" x-show="!createNew">
					<label class="form-grid__field__label">Product</label>
					<div class="form-grid__field__control">
						<div class="searchable-select" x-data="searchableSelect()" data-initial-label="" @click.outside="open = false" @keydown.escape="open = false">
							<input type="hidden" name="Edit.ProductId" value="" x-ref="hidden">
							<div class="searchable-select__control">
								<input type="text" class="field__input" role="combobox" aria-controls="edit-product-Guid_1-listbox" aria-autocomplete="list" autocomplete="off" placeholder="Find a product…" x-model="query" :aria-expanded="open" @focus="open = true" @keydown.down.prevent="highlightNext()" @keydown.up.prevent="highlightPrev()" @keydown.enter.prevent="chooseHighlighted()" name="q" hx-get="/Intake/Review/Guid_2?handler=FilterProducts" hx-trigger="keyup changed delay:250ms, focus" hx-target="#edit-product-Guid_1-listbox" hx-swap="innerHTML" hx-params="q">
							</div>
							<ul class="searchable-select__listbox" id="edit-product-Guid_1-listbox" role="listbox" x-ref="listbox" x-show="open" x-cloak="">
								<li role="option" data-value="Guid_3" @click="select($el.dataset.value, $el.textContent.trim())">Milk</li>
								<li role="option" data-value="Guid_4" @click="select($el.dataset.value, $el.textContent.trim())">Bread</li>
								<li role="option" data-value="Guid_5" @click="select($el.dataset.value, $el.textContent.trim())">Eggs</li>
							</ul>
						</div>
					</div>
				</div>
				<div class="form-grid__field" x-show="createNew">
					<label class="form-grid__field__label">New product name</label>
					<div class="form-grid__field__control">
						<input class="field__input" name="Edit.NewProductName" value="" placeholder="MYSTERY ITEM XZ">
					</div>
				</div>
				<div class="form-grid__field" x-show="createNew">
					<label class="form-grid__field__label">Category</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.NewProductCategoryId">
							<option value="">— Category —</option>
							<option value="Guid_6">Dairy</option>
						</select>
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Quantity</label>
					<div class="form-grid__field__control">
						<input class="field__input" type="number" step="any" min="0" name="Edit.Quantity" value="">
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Unit</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.UnitId">
							<option value="">— Unit —</option>
							<option value="Guid_7">ea — Each</option>
							<option value="Guid_8">L — Litre</option>
						</select>
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Location</label>
					<div class="form-grid__field__control">
						<select class="field__input" name="Edit.LocationId">
							<option value="">— Location —</option>
							<option value="Guid_9">Fridge</option>
						</select>
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Expires</label>
					<div class="form-grid__field__control">
						<input class="field__input" type="date" name="Edit.ExpiryDate" value="">
					</div>
				</div>
				<div class="form-grid__field">
					<label class="form-grid__field__label">Price (optional)</label>
					<div class="form-grid__field__control">
						<input class="field__input" type="number" step="any" min="0" name="Edit.Price" value="">
					</div>
				</div>
			</div>
			<div class="import-row__edit-foot">
				<button type="button" class="btn btn--ghost btn--sm import-row__edit-danger" hx-post="/Intake/Review/Guid_2?lineId=Guid_1&amp;handler=DismissLine" hx-target="#import-line-Guid_1" hx-swap="outerHTML">
					Not pantry stock — remove
				</button>
				<span class="import-row__edit-spacer"></span>
				<button type="submit" class="btn btn--primary btn--sm">
					<svg class="icon" aria-hidden="true">
						<use href="#i-check"></use>
					</svg>
					Confirm item
				</button>
			</div>
		</form>
	</div>
</div>
