<div class="rd-fulf-card ">
	<div class="rd-fulf-top">
		<div class="rd-fulf-headline">
			<span class="rd-fulf-count fulf-mid">1 of 3</span>
			<span class="rd-fulf-of">ingredients</span>
		</div>
		<div class="rd-fulf-sub">in your pantry right now</div>
		<div class="rd-fulf-bar-wrap" role="progressbar" aria-valuenow="67" aria-valuemin="0" aria-valuemax="100">
			<span class="rd-fulf-bar-fill fulf-mid-bg" style="width:67%"></span>
		</div>
		<div class="rd-fulf-chips">
			<span class="rd-fulf-chip rd-fulf-chip--have">
				<span class="rd-fulf-chip__dot fulf-hi-bg"></span>
				1 in stock
			</span>
			<span class="rd-fulf-chip rd-fulf-chip--low">
				<span class="rd-fulf-chip__dot fulf-mid-bg"></span>
				1 running low
			</span>
			<span class="rd-fulf-chip rd-fulf-chip--miss">
				<span class="rd-fulf-chip__dot fulf-lo-bg"></span>
				1 to buy
			</span>
		</div>
	</div>
	<div class="rd-actions">
		<a :href="`/Recipes/Guid_1/Cook?Servings=${servings}`" href="/Recipes/Guid_1/Cook?Servings=4" class="btn btn--cook">
			<svg class="icon" aria-hidden="true">
				<use href="#i-flame"></use>
			</svg>
			Cook this
		</a>
		<input type="hidden" name="__RequestVerificationToken" value="{scrubbed-antiforgery-token}">
		<input type="hidden" id="rd-servings-input" name="servings" :value="servings">
		<button type="button" class="btn btn--soft" hx-post="/Recipes/Guid_1?handler=AddMissing" hx-include="#rd-servings-input" hx-swap="none" @htmx:after-request="if ($event.detail.successful) missingAdded = true" :disabled="missingAdded">
			<svg class="icon" aria-hidden="true" x-show="!missingAdded">
				<use href="#i-cart"></use>
			</svg>
			<svg class="icon" aria-hidden="true" x-show="missingAdded" x-cloak="">
				<use href="#i-check"></use>
			</svg>
			<span x-show="!missingAdded">Add 1 missing to shopping list</span>
			<span x-show="missingAdded" x-cloak="">Added</span>
		</button>
		<a href="/Recipes/Guid_1/Edit" class="btn btn--secondary">
			<svg class="icon" aria-hidden="true">
				<use href="#i-edit"></use>
			</svg>
			Edit recipe
		</a>
	</div>
</div>
