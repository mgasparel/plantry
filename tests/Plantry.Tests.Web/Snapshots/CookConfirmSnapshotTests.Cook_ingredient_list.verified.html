<div class="card__body cook-ing-list" role="list" aria-label="Ingredients">
	<div class="cook-ing-row" role="listitem" :class="{ 'cook-ing-row--skipped': isSkipped('Guid_1') }" x-data="{}">
		<div class="cook-ing-status cook-ing-status--ok" aria-label="In stock">
			<svg class="icon" aria-hidden="true">
				<use href="#i-check"></use>
			</svg>
		</div>
		<div class="cook-ing-row__body">
			<div class="cook-ing-row__name">
				Rigatoni
			</div>
			<div class="cook-ing-row__qty-edit">
				<div class="stepper" role="group">
					<button type="button" class="stepper__btn" aria-label="Decrease" @click="adjustQty('Guid_1', -1)" :disabled="isSkipped('Guid_1')">
						<svg class="icon" aria-hidden="true">
							<use href="#i-minus"></use>
						</svg>
					</button>
					<input class="stepper__val" type="number" name="" min="0" step="any" :value="quantity('Guid_1')" @input="setQuantity('Guid_1', $event.target.value)" :disabled="isSkipped('Guid_1')">
					<button type="button" class="stepper__btn" aria-label="Increase" @click="adjustQty('Guid_1', 1)" :disabled="isSkipped('Guid_1')">
						<svg class="icon" aria-hidden="true">
							<use href="#i-plus"></use>
						</svg>
					</button>
				</div>
				<span class="cook-ing-row__unit">g</span>
			</div>
		</div>
		<div class="cook-ing-row__actions">
			<button type="button" class="btn btn--ghost btn--sm cook-skip-btn" @click="toggleSkip('Guid_1')" :aria-pressed="isSkipped('Guid_1')" aria-label="Skip ingredient">
				<span x-show="!isSkipped('Guid_1')">Skip</span>
				<span x-show="isSkipped('Guid_1')">Undo</span>
			</button>
		</div>
		<div class="cook-ing-row__skip-overlay" x-show="isSkipped('Guid_1')" x-cloak="">Skipped</div>
	</div>
	<div class="cook-ing-row" role="listitem" :class="{ 'cook-ing-row--skipped': isSkipped('Guid_2') }" x-data="{}">
		<div class="cook-ing-status cook-ing-status--shortfall" aria-label="Shortfall">
			<svg class="icon" aria-hidden="true">
				<use href="#i-alert"></use>
			</svg>
		</div>
		<div class="cook-ing-row__body">
			<div class="cook-ing-row__name">
				Canned Tomatoes
				<span class="cook-shortfall-tag">
					have 200 / need 500 g
				</span>
			</div>
			<div class="cook-ing-row__qty-edit">
				<div class="stepper" role="group">
					<button type="button" class="stepper__btn" aria-label="Decrease" @click="adjustQty('Guid_2', -1)" :disabled="isSkipped('Guid_2')">
						<svg class="icon" aria-hidden="true">
							<use href="#i-minus"></use>
						</svg>
					</button>
					<input class="stepper__val" type="number" name="" min="0" step="any" :value="quantity('Guid_2')" @input="setQuantity('Guid_2', $event.target.value)" :disabled="isSkipped('Guid_2')">
					<button type="button" class="stepper__btn" aria-label="Increase" @click="adjustQty('Guid_2', 1)" :disabled="isSkipped('Guid_2')">
						<svg class="icon" aria-hidden="true">
							<use href="#i-plus"></use>
						</svg>
					</button>
				</div>
				<span class="cook-ing-row__unit">g</span>
			</div>
		</div>
		<div class="cook-ing-row__actions">
			<button type="button" class="btn btn--ghost btn--sm cook-skip-btn" @click="toggleSkip('Guid_2')" :aria-pressed="isSkipped('Guid_2')" aria-label="Skip ingredient">
				<span x-show="!isSkipped('Guid_2')">Skip</span>
				<span x-show="isSkipped('Guid_2')">Undo</span>
			</button>
		</div>
		<div class="cook-ing-row__skip-overlay" x-show="isSkipped('Guid_2')" x-cloak="">Skipped</div>
	</div>
	<div class="cook-ing-row" role="listitem" :class="{ 'cook-ing-row--skipped': isSkipped('Guid_3') }" x-data="{}">
		<div class="cook-ing-status cook-ing-status--ok" aria-label="In stock">
			<svg class="icon" aria-hidden="true">
				<use href="#i-check"></use>
			</svg>
		</div>
		<div class="cook-ing-row__body">
			<div class="cook-ing-row__name">
				Garlic
			</div>
			<div class="cook-ing-row__qty-edit">
				<div class="stepper" role="group">
					<button type="button" class="stepper__btn" aria-label="Decrease" @click="adjustQty('Guid_3', -1)" :disabled="isSkipped('Guid_3')">
						<svg class="icon" aria-hidden="true">
							<use href="#i-minus"></use>
						</svg>
					</button>
					<input class="stepper__val" type="number" name="" min="0" step="any" :value="quantity('Guid_3')" @input="setQuantity('Guid_3', $event.target.value)" :disabled="isSkipped('Guid_3')">
					<button type="button" class="stepper__btn" aria-label="Increase" @click="adjustQty('Guid_3', 1)" :disabled="isSkipped('Guid_3')">
						<svg class="icon" aria-hidden="true">
							<use href="#i-plus"></use>
						</svg>
					</button>
				</div>
				<span class="cook-ing-row__unit">ea</span>
			</div>
			<div class="cook-picker" id="cook-picker-Guid_3">
				<div class="cook-picker__label">Choose variant</div>
				<div class="suggest-opts">
					<button type="button" class="suggest-opt" :class="{ 'sel': pickerVariant('Guid_3') === 'Guid_4' }" @click="setVariant('Guid_3', 'Guid_4')" :disabled="isSkipped('Guid_3')">
						<svg class="icon" aria-hidden="true" x-show="pickerVariant('Guid_3') === 'Guid_4'">
							<use href="#i-check"></use>
						</svg>
						Garlic, Fresh
						<span class="rk">
							5 ea
						</span>
						<span class="rk">best</span>
					</button>
					<button type="button" class="suggest-opt" disabled="" title="Unit incompatible — cannot use for this ingredient" aria-disabled="true">
						Garlic, Granule
						<span class="rk cook-picker__incompat">unit mismatch</span>
					</button>
				</div>
				<input type="hidden" name="PickerSelections[Guid_3].IngredientId" value="Guid_3">
				<input type="hidden" name="PickerSelections[Guid_3].VariantId" :value="pickerVariant('Guid_3') ?? 'Guid_4'">
			</div>
		</div>
		<div class="cook-ing-row__actions">
			<button type="button" class="btn btn--ghost btn--sm cook-skip-btn" @click="toggleSkip('Guid_3')" :aria-pressed="isSkipped('Guid_3')" aria-label="Skip ingredient">
				<span x-show="!isSkipped('Guid_3')">Skip</span>
				<span x-show="isSkipped('Guid_3')">Undo</span>
			</button>
		</div>
		<div class="cook-ing-row__skip-overlay" x-show="isSkipped('Guid_3')" x-cloak="">Skipped</div>
	</div>
	<div class="cook-ing-row cook-ing-row--untracked" role="listitem">
		<div class="cook-ing-row__name">Salt</div>
		<div class="cook-ing-row__sub">to taste</div>
	</div>
</div>
