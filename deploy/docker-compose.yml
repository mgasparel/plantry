# docker-compose.yml — Plantry self-hosted stack
#
# This is the file self-hosters use.  It differs from the maintainer's own
# docker-compose.prod.yml in two ways:
#
#   1. Caddy is NOT included here — most operators already have a reverse proxy
#      (nginx, Traefik, Caddy on the host, etc.).  Port 8080 is exposed on the
#      host so you can front it with your own proxy.  If you want the bundled
#      Caddy TLS configuration, overlay docker-compose.caddy.yml:
#
#        docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
#
#   2. No backup sidecar — operators manage their own backup policy.
#      See https://github.com/gastownhall/plantry/blob/main/deploy/backup.sh
#      for a pg_dump helper you can run from a host crontab.
#
# Quick start:
#   cp .env.example .env
#   $EDITOR .env          # fill in your passwords; chmod 600 .env
#   docker compose up -d
#
# Updates:
#   docker compose pull
#   docker compose up -d
#
# The migrator runs automatically before the web app starts and is idempotent —
# multi-version jumps (e.g. 1.0 -> 1.7) are handled in one shot.
# See https://github.com/gastownhall/plantry/blob/main/docs/Operations/self-hosting.md

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: plantrydb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Enable pg_stat_statements for query-performance visibility and log slow queries.
    # -c shared_preload_libraries loads pg_stat_statements at startup (requires a postgres
    # restart to change; a fresh volume picks it up automatically on first init).
    # -c log_min_duration_statement emits a LOG line for any query that exceeds the
    # threshold (in ms); default 1000 ms. Set to 0 to log all queries (high-volume —
    # use only briefly for investigations; restore the default afterwards).
    # The migrator runs CREATE EXTENSION IF NOT EXISTS pg_stat_statements automatically,
    # so the extension view is queryable as soon as the stack is up — no manual step needed.
    # See docs/Operations/query-performance.md for the full investigation workflow.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "log_min_duration_statement=${PGCONFIG_LOG_MIN_DURATION_STATEMENT:-1000}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d plantrydb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── DataProtection cert init (one-shot) ──────────────────────────────────
  # Generates a self-signed PFX certificate into the dp_certs volume on first
  # run, then exits.  The certificate is used by plantry-web to encrypt the
  # ASP.NET Core DataProtection key ring at rest (XmlKeyManager[35] warning).
  # Idempotent: if /certs/dp.pfx already exists the service exits immediately
  # without regenerating.  10-year validity makes rotation a non-issue for a
  # household app; the file is protected by DP_CERT_PASSWORD.
  # See docs/Operations/self-hosting.md for the full cert-provisioning notes.
  dp-cert-init:
    image: alpine:3
    restart: "no"
    environment:
      DP_CERT_PASSWORD: ${DP_CERT_PASSWORD}
    volumes:
      - dp_certs:/certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -f /certs/dp.pfx ]; then
          echo "==> dp.pfx already exists — skipping generation"
          exit 0
        fi
        echo "==> Generating DataProtection certificate"
        apk add --no-cache openssl > /dev/null 2>&1
        openssl req -x509 -nodes -newkey rsa:2048 \
          -keyout /tmp/dp.key \
          -out /tmp/dp.crt \
          -days 3650 \
          -subj "/CN=plantry-dataprotection"
        openssl pkcs12 -export \
          -inkey /tmp/dp.key \
          -in /tmp/dp.crt \
          -out /certs/dp.pfx \
          -passout env:DP_CERT_PASSWORD
        chmod 600 /certs/dp.pfx
        echo "==> DataProtection certificate generated"

  # ── Migrator (one-shot) ───────────────────────────────────────────────────
  # Applies all EF migrations and reconciles the app_user password from .env,
  # then exits.  The web app will not start until this completes successfully.
  # Re-running is safe — MigrateAsync is idempotent when already current.
  migrator:
    image: ${MIGRATOR_IMAGE:-ghcr.io/gastownhall/plantry/migrator:latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__plantrydb: "Host=postgres;Port=5432;Database=plantrydb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Database__AppUserPassword: ${APP_USER_PASSWORD}

  # ── Plantry Web ───────────────────────────────────────────────────────────
  # Connects as the least-privilege app_user only.
  # Row-level security enforces household data isolation at the database layer.
  plantry-web:
    image: ${PLANTRY_WEB_IMAGE:-ghcr.io/gastownhall/plantry/web:latest}
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
      dp-cert-init:
        condition: service_completed_successfully
    ports:
      # Exposed on the host so you can front it with your own reverse proxy.
      # If you use the bundled Caddy overlay (docker-compose.caddy.yml), remove
      # or comment this ports block so Caddy is the only ingress.
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      # Parity with docker-compose.prod.yml: probe /alive (liveness) so self-hosters
      # get the same liveness gate prod uses. /alive checks only the "live"-tagged check
      # (a self-check that always passes), so a DB blip never marks the container unhealthy
      # or blocks a reverse proxy that depends on service_healthy.
      # Uses bash's /dev/tcp pseudo-device — present in the mcr.microsoft.com/dotnet/aspnet
      # runtime image without requiring curl or wget.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          exec 3<>/dev/tcp/localhost/8080 &&
          printf 'GET /alive HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__plantrydb: "Host=postgres;Port=5432;Database=plantrydb;Username=app_user;Password=${APP_USER_PASSWORD}"
      Database__AppUserPassword: ${APP_USER_PASSWORD}
      # Optional: omit (or leave blank) to degrade AI features to a locked-feature
      # UI.  The app still runs normally without an AI key.
      AI__ApiKey: ${AI_API_KEY:-}
      # DataProtection key ring encryption.  The PFX certificate is generated by
      # the dp-cert-init one-shot service and mounted from the dp_certs volume.
      # Must match DP_CERT_PASSWORD in .env.
      DP_CERT_PASSWORD: ${DP_CERT_PASSWORD}
    volumes:
      # Persist the ASP.NET Core DataProtection key ring so auth cookies and
      # antiforgery tokens survive 'docker compose pull && up -d' (container
      # recreation).  Without this, every update invalidates all sessions.
      # /keys matches the PersistKeysToFileSystem path configured in Program.cs.
      - dp_keys:/keys
      # DataProtection encryption certificate (generated by dp-cert-init on first run).
      - dp_certs:/certs:ro

volumes:
  postgres_data:
  dp_keys:
  dp_certs:
