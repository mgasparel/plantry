# Production Docker Compose for Plantry (ADR-016 Decision 2)
# Hand-maintained — NOT the Aspire-generated aspire-output/docker-compose.yaml.
# The Aspire-generated file bundles the dashboard and passes superuser creds to the web app.
#
# Usage:
#   cp .env.example .env          # first-time setup
#   $EDITOR .env                  # fill in real secrets (chmod 600 .env)
#   docker compose -f docker-compose.prod.yml up -d
#
# Deploy procedure (what CD does — per ADR-016 and docs/Operations/deployment.md):
#   export PLANTRY_WEB_IMAGE=ghcr.io/<org>/plantry-web:<sha>
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml run --rm migrator
#   docker compose -f docker-compose.prod.yml up -d plantry-web
#   curl -fsS https://${DOMAIN}/alive
#
# Backups: a `backup` service runs pg_dump on a cron schedule (via busybox crond)
# and writes timestamped .dump files to ./backups/ on the host (bind-mount).
# Set RCLONE_REMOTE (e.g. "backblaze:plantry-backups") in .env and install
# rclone on the host to enable off-host sync.  See deploy/backup.sh and
# docs/Operations/deployment.md for the full backup/restore procedure.
#
# See docs/Operations/deployment.md for the full runbook.

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: plantrydb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Enable pg_stat_statements for query-performance visibility and log slow queries.
    # -c shared_preload_libraries loads pg_stat_statements at startup (requires a postgres
    # restart to change; a fresh volume picks it up automatically on first init).
    # -c log_min_duration_statement emits a LOG line for any query that exceeds the
    # threshold (in ms); default 1000 ms (1 second).  Set
    # PGCONFIG_LOG_MIN_DURATION_STATEMENT=0 in .env to log every query (high-volume —
    # use only for short investigation sessions, then restore the default).
    # The migrator runs CREATE EXTENSION IF NOT EXISTS pg_stat_statements automatically,
    # so the extension view is queryable as soon as the stack is up — no manual step needed.
    # See docs/Operations/query-performance.md for the full investigation workflow.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "log_min_duration_statement=${PGCONFIG_LOG_MIN_DURATION_STATEMENT:-1000}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready is more reliable than a TCP check and works without the psql client.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d plantrydb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── DataProtection cert init (one-shot) ──────────────────────────────────
  # Generates a self-signed PFX certificate into the dp_certs volume on first
  # run, then exits.  The certificate is used by plantry-web to encrypt the
  # ASP.NET Core DataProtection key ring at rest (XmlKeyManager[35] warning).
  # Idempotent: if /certs/dp.pfx already exists the service exits immediately
  # without regenerating.  10-year validity makes rotation a non-issue for a
  # household app; the file is protected by DP_CERT_PASSWORD.
  # See docs/Operations/self-hosting.md for the full cert-provisioning notes.
  dp-cert-init:
    image: alpine:3
    restart: "no"
    environment:
      DP_CERT_PASSWORD: ${DP_CERT_PASSWORD}
    volumes:
      - dp_certs:/certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -f /certs/dp.pfx ]; then
          echo "==> dp.pfx already exists — skipping generation"
          exit 0
        fi
        echo "==> Generating DataProtection certificate"
        apk add --no-cache openssl > /dev/null 2>&1
        openssl req -x509 -nodes -newkey rsa:2048 \
          -keyout /tmp/dp.key \
          -out /tmp/dp.crt \
          -days 3650 \
          -subj "/CN=plantry-dataprotection"
        openssl pkcs12 -export \
          -inkey /tmp/dp.key \
          -in /tmp/dp.crt \
          -out /certs/dp.pfx \
          -passout env:DP_CERT_PASSWORD
        chmod 600 /certs/dp.pfx
        echo "==> DataProtection certificate generated"

  # ── Migrator (one-shot) ───────────────────────────────────────────────────
  # Applies all EF migrations with owner credentials and reconciles the
  # app_user password, then exits. Web will not start until this completes
  # successfully (service_completed_successfully). See ADR-017.
  migrator:
    image: ${MIGRATOR_IMAGE:-ghcr.io/gastownhall/plantry/migrator:latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__plantrydb: "Host=postgres;Port=5432;Database=plantrydb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};GssEncMode=disable"
      Database__AppUserPassword: ${APP_USER_PASSWORD}

  # ── Plantry Web ───────────────────────────────────────────────────────────
  # Connects as the least-privilege app_user only — never the owner.
  # Row-level security enforces household data isolation at the database layer.
  plantry-web:
    image: ${PLANTRY_WEB_IMAGE:-ghcr.io/gastownhall/plantry/web:latest}
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
      dp-cert-init:
        condition: service_completed_successfully
      lgtm:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__plantrydb: "Host=postgres;Port=5432;Database=plantrydb;Username=app_user;Password=${APP_USER_PASSWORD};GssEncMode=disable"
      Database__AppUserPassword: ${APP_USER_PASSWORD}
      # Optional: omit to degrade AI features to a locked-feature UI (the app still runs).
      AI__ApiKey: ${AI_API_KEY:-}
      # DataProtection key ring encryption.  The PFX certificate is generated by
      # the dp-cert-init one-shot service and mounted from the dp_certs volume.
      # Must match DP_CERT_PASSWORD in .env.
      DP_CERT_PASSWORD: ${DP_CERT_PASSWORD}
      # Observability — OTLP export to the bundled lgtm sidecar.
      # ServiceDefaults auto-enables the OTLP exporter when this is set.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    volumes:
      # Persist the ASP.NET Core DataProtection key ring so auth cookies and
      # antiforgery tokens survive container recreation on update.  Without
      # this, every 'docker compose up -d' after an image pull invalidates
      # all user sessions.
      # /keys matches the PersistKeysToFileSystem path configured in Program.cs.
      - dp_keys:/keys
      # DataProtection encryption certificate (generated by dp-cert-init on first run).
      - dp_certs:/certs:ro
    # Web is not exposed directly — Caddy handles TLS termination and reverse proxying.
    healthcheck:
      # The mcr.microsoft.com/dotnet/aspnet runtime image ships bash but not curl/wget.
      # This probe sends a minimal HTTP/1.0 GET to /alive via bash's /dev/tcp pseudo-device
      # and checks that the response contains "200". It validates that Kestrel is up and
      # the liveness endpoint is responding before Caddy begins proxying traffic.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - |
          exec 3<>/dev/tcp/localhost/8080 &&
          printf 'GET /alive HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Caddy (TLS termination + reverse proxy) ───────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      plantry-web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}

  # ── LGTM (OTel Collector + Loki + Tempo + Prometheus + Grafana) ───────────
  # All-in-one observability backend.  Receives OTLP from plantry-web and exposes
  # a Grafana UI on port 3000 — bound to localhost only.  Access via SSH tunnel:
  #   ssh -L 3000:127.0.0.1:3000 your-host
  # then open http://localhost:3000.  Credentials: admin / GF_SECURITY_ADMIN_PASSWORD.
  # Documented by Grafana as suited for single-node use; acceptable for a
  # single-household VPS (ADR-016).  Upgrade path if outgrown: SigNoz or Uptrace.
  lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    environment:
      # Grafana admin password — set GF_SECURITY_ADMIN_PASSWORD in .env.
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      # Retention — pass CLI flags through to the bundled daemons.
      # Bare LOKI_RETENTION_PERIOD / PROMETHEUS_RETENTION_TIME are not recognised
      # by grafana/otel-lgtm; the *_EXTRA_ARGS mechanism is the supported path.
      LOKI_EXTRA_ARGS: "--limits.retention-period=${LOKI_RETENTION_PERIOD:-744h}"
      PROMETHEUS_EXTRA_ARGS: "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}"
      # Tempo: block-retention is not exposed as a CLI flag in the bundled version;
      # the built-in default applies. Revisit when otel-lgtm exposes a TEMPO_EXTRA_ARGS knob.
    ports:
      # Bound to localhost only — not exposed to the internet.  Access via SSH tunnel.
      - "127.0.0.1:3000:3000"
    volumes:
      - lgtm_data:/data
    healthcheck:
      # curl-minimal is present in the grafana/otel-lgtm image (wget is not).
      # -sf: -s silent, -f fail on HTTP error → exit 1 on non-2xx.
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backup (scheduled pg_dump) ────────────────────────────────────────────
  # Runs pg_dump on a cron schedule inside a sidecar container that shares the
  # postgres network.  Dumps are written to ./backups/ on the host via a
  # bind-mount.  Uses busybox crond (included in the postgres:17-alpine image)
  # which runs in the foreground, logs to stdout, and exits cleanly on SIGTERM.
  #
  # Schedule (default: 03:00 UTC daily) is set via BACKUP_CRON in .env.
  # Off-host sync requires rclone to be installed on the host and
  # RCLONE_REMOTE set in .env (e.g. "backblaze:plantry-backups").
  # The backup service itself only writes locally; deploy/backup.sh handles
  # the optional rclone sync when invoked from the host crontab.
  #
  # See docs/Operations/deployment.md — Backups section for full procedure.
  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Owner credentials — the same role the migrator uses, so pg_dump can
      # read all schemas.  Never use app_user here: it lacks dump privileges.
      # PGUSER is the env var pg_dump/psql use to set the connection role;
      # POSTGRES_USER is only used by the postgres entrypoint (not pg_dump).
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: plantrydb
      # cron schedule for pg_dump (default: 03:00 UTC daily).
      # Expressed in standard cron format: min hour dom mon dow
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      # Retain at most this many days of local dump files (default: 14).
      KEEP_DAYS: ${KEEP_DAYS:-14}
    volumes:
      # Bind-mount a host directory so dumps survive container restarts.
      # The directory is created by docker compose on first up if absent.
      - ${BACKUP_DIR:-./backups}:/backups
    # The entrypoint uses crond (busybox) to run pg_dump on schedule.
    # -f keeps crond in the foreground (required for a container).
    # The crontab is written inline from BACKUP_CRON so no extra image is needed.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /backups
        chmod 700 /backups
        # Write crontab using the BACKUP_CRON env var.
        CRON_FILE=/etc/crontabs/backup
        echo "$${BACKUP_CRON} /usr/local/bin/run-backup.sh >> /proc/1/fd/1 2>&1" > "$$CRON_FILE"
        # Write the backup helper script.
        # pg_dump reads PGUSER, PGPASSWORD, PGHOST, PGPORT, PGDATABASE from env;
        # busybox crond inherits the daemon's environment, so these are available.
        cat > /usr/local/bin/run-backup.sh <<'SCRIPT'
        #!/bin/sh
        set -e
        TIMESTAMP=$$(date -u +"%Y%m%dT%H%M%SZ")
        DUMP_FILE="/backups/plantrydb-$${TIMESTAMP}.dump"
        echo "==> pg_dump started $$(date -u)"
        pg_dump -Fc --no-password -f "$${DUMP_FILE}"
        echo "    OK — $$(du -sh $${DUMP_FILE} | cut -f1) written"
        # Prune files older than KEEP_DAYS.
        find /backups -name "plantrydb-*.dump" -mtime +"$${KEEP_DAYS}" -delete
        echo "==> pg_dump done $$(date -u)"
        SCRIPT
        chmod +x /usr/local/bin/run-backup.sh
        echo "==> Backup service ready; schedule: $${BACKUP_CRON}"
        # Run crond in foreground (-f) at log level 0 (errors only: -l 0).
        exec crond -f -l 0

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  dp_keys:
  dp_certs:
  lgtm_data:
