services:
  docker-compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  postgres:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "plantrydb-data"
        read_only: false
    networks:
      - "aspire"
  plantry-web:
    image: "${PLANTRY_WEB_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${PLANTRY_WEB_PORT}"
      ConnectionStrings__plantrydb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=plantrydb"
      PLANTRYDB_HOST: "postgres"
      PLANTRYDB_PORT: "5432"
      PLANTRYDB_USERNAME: "postgres"
      PLANTRYDB_PASSWORD: "${POSTGRES_PASSWORD}"
      PLANTRYDB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/plantrydb"
      PLANTRYDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/plantrydb"
      PLANTRYDB_DATABASENAME: "plantrydb"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://docker-compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "plantry-web"
    expose:
      - "${PLANTRY_WEB_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  plantrydb-data:
    driver: "local"
