# CD — build → push GHCR → ssh → migrate → up → smoke
#
# Runs only when CI passes on main (workflow_run on the "CI" workflow).
# This guarantees CD never deploys a SHA that hasn't passed the full test suite.
#
# Required GitHub Actions secrets (repository or environment level):
#   DEPLOY_SSH_KEY   — PEM-encoded private SSH key whose public half is in
#                      ~/.ssh/authorized_keys on the deploy host
#   DEPLOY_HOST      — hostname or IP of the production server (SSH target; may be an
#                      IP address or admin hostname, not necessarily the public domain)
#   DEPLOY_USER      — SSH username on the production server (e.g. plantry)
#   DEPLOY_DOMAIN    — public TLS domain served by Caddy (e.g. plantry.example.com);
#                      used for the post-deploy smoke check at https://<domain>/alive.
#                      Must match the DOMAIN variable in the host .env file.
#                      Kept separate from DEPLOY_HOST because the SSH target and the
#                      TLS-validated public hostname are often different addresses.
#
# GHCR is authenticated via the built-in GITHUB_TOKEN (write:packages is granted
# automatically for Actions on the same repository — no extra secret needed).
#
# Compose file on the host must exist at ~/plantry/docker-compose.prod.yml
# and the .env file at ~/plantry/.env (root-owned, mode 600 for secrets).
# See docs/Operations/deployment.md for the full runbook.

name: CD

on:
  # Trigger after the CI workflow completes successfully on main.
  # This means CD only runs when all CI jobs (fast + e2e) have passed.
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  # ── Guard: skip if CI did not succeed ────────────────────────────────────────
  # workflow_run fires for any conclusion (success, failure, cancelled, etc.).
  # This job-level condition gates the entire workflow on success only.
  #
  # ── Stage 1: Build images and push to GHCR ───────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Allow writing to GHCR using the built-in GITHUB_TOKEN.
    permissions:
      contents: read
      packages: write

    # Expose the SHA of the triggering commit so subsequent jobs can reference
    # the exact image tags that were pushed.
    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          # Check out the commit that CI validated, not whatever is at HEAD now.
          ref: ${{ github.event.workflow_run.head_sha }}

      # Capture the short SHA once; used for image tags and the deploy step.
      - name: Set image metadata
        id: meta
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      # Set up QEMU for multi-platform builds (optional; included for future arm64).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Plantry.Web image ────────────────────────────────────────────────────
      # Dockerfile is at the repo root; build context is the repo root.
      # Tagged with both the exact commit SHA (immutable, for deploy) and
      # 'latest' (for convenience, always points to the last successful deploy).
      - name: Build and push plantry-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plantry/web:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository_owner }}/plantry/web:latest
          # Layer cache from the GHCR image so builds are fast on cache hits.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/plantry/web:latest
          cache-to: type=inline

      # ── Plantry.Migrator image ───────────────────────────────────────────────
      # Dockerfile lives under src/Plantry.Migrator/; build context is repo root
      # (same as the web Dockerfile — it copies from src/).
      - name: Build and push plantry-migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Plantry.Migrator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plantry/migrator:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository_owner }}/plantry/migrator:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/plantry/migrator:latest
          cache-to: type=inline

  # ── Stage 2: Deploy to the production host ───────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15
    # Require explicit environment approval if configured; otherwise runs automatically.
    # Configure a "production" GitHub environment (with deployment protection rules)
    # to add a manual approval gate before any production deploy.
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # The deploy script runs entirely on the remote host.
          # All commands are set -e so any failure aborts immediately.
          # The migrator step is the critical gate: a non-zero exit leaves the
          # old web container running and fails the workflow — the old version
          # keeps serving and the CI job marks the deploy as failed.
          script: |
            set -euo pipefail

            SHA="${{ needs.build-and-push.outputs.sha }}"
            COMPOSE_DIR=~/plantry
            COMPOSE_FILE="$COMPOSE_DIR/docker-compose.prod.yml"

            echo "==> Deploying SHA $SHA"
            cd "$COMPOSE_DIR"

            # Export the exact image tags so Compose uses the validated SHA images.
            export PLANTRY_WEB_IMAGE="ghcr.io/${{ github.repository_owner }}/plantry/web:$SHA"
            export MIGRATOR_IMAGE="ghcr.io/${{ github.repository_owner }}/plantry/migrator:$SHA"

            # 1. Pull both images (fails loud if the registry is unreachable or
            #    the images don't exist — deploy aborts before touching anything).
            echo "==> Pulling images"
            docker compose -f "$COMPOSE_FILE" pull plantry-web migrator

            # 2. Run migrations (one-shot, fails loud).
            #    If exit code != 0 the script aborts here (set -e).
            #    The old web container continues serving — no downtime on failure.
            echo "==> Running migrator"
            docker compose -f "$COMPOSE_FILE" run --rm migrator

            # 3. Roll the web service to the new image.
            #    Caddy is included so any Caddyfile changes in the same deploy
            #    take effect; it hot-reloads its config, so downtime is negligible.
            echo "==> Starting updated services"
            docker compose -f "$COMPOSE_FILE" up -d plantry-web caddy

            echo "==> Deploy complete, running smoke check"

      # Smoke check runs from the Actions runner (not the host) so it validates
      # that the service is reachable from the outside world, not just localhost.
      # Retries up to 5 times with 10-second delays to allow the container and
      # Caddy to finish starting before declaring failure.
      - name: Smoke check /alive
        run: |
          SHA="${{ needs.build-and-push.outputs.sha }}"
          # Use DEPLOY_DOMAIN (the public TLS hostname Caddy serves) rather than
          # DEPLOY_HOST (the SSH target, which may be an IP or admin hostname).
          # curl --fail verifies the TLS certificate, so the smoke URL must match
          # the domain Caddy has a valid cert for.
          HOST="${{ secrets.DEPLOY_DOMAIN }}"
          URL="https://${HOST}/alive"

          echo "==> Smoke-checking $URL (SHA $SHA)"

          for attempt in 1 2 3 4 5; do
            echo "  Attempt $attempt/5..."
            if curl --fail --silent --show-error --max-time 10 "$URL"; then
              echo ""
              echo "==> Smoke check passed"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "  Not ready yet, waiting 10s..."
              sleep 10
            fi
          done

          echo "ERROR: smoke check failed after 5 attempts — $URL did not return 2xx"
          exit 1
