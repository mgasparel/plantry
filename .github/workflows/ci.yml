name: CI

# Fast pre-merge gate: build + unit + architecture only (~1.5 min).
#
# The slow suite (integration + E2E + coverage) and the production deploy moved
# to the release-tag pipeline in release.yml — see ADR-016 (amended 2026-06-20).
#
# Rationale: under strictly serial development (ADR-016 Decision 3) every issue
# already runs the FULL suite incl. E2E in the local pre-flight before it lands,
# so a per-PR CI E2E run was a redundant environment re-run, not first-line
# coverage. At a high PR rate that re-run (~7 min × every PR, doubled by the
# push+PR overlap) was the dominant Actions-minute cost. E2E now gates the
# release tag (and therefore prod), not every PR. CI here is the cheap tripwire
# that keeps `main` building and green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Change filter: is there anything other than Markdown to build/test? ───────
  # Docs-only (*.md) changes skip the build/test steps below.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `code` is true when any changed file is NOT Markdown. dorny matches a
          # file if it matches ANY listed pattern (.some), so a single negated glob
          # means "matches when the file is not *.md" — an all-Markdown change
          # matches nothing and `code` is false. Do NOT add a `'**'` line: it
          # matches everything and would make `code` always true (the negation
          # would never subtract).
          filters: |
            code:
              - '!**/*.md'

  # ── Fast gate: build + unit + architecture (< 2 min) ─────────────────────────
  fast:
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'

      - name: Setup .NET 10
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # NuGet package cache — keyed on SDK version + all project files.
      - name: Cache NuGet packages
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        if: needs.changes.outputs.code == 'true'
        run: dotnet restore

      - name: Build
        if: needs.changes.outputs.code == 'true'
        run: dotnet build --no-restore --configuration Release

      # ── L1: Domain unit tests ───────────────────────────────────────────────
      - name: Unit tests
        if: needs.changes.outputs.code == 'true'
        run: >
          dotnet test tests/Plantry.Tests.Unit
          --no-build --configuration Release

      # ── L1: Architecture boundary tests ─────────────────────────────────────
      - name: Architecture tests
        if: needs.changes.outputs.code == 'true'
        run: >
          dotnet test tests/Plantry.Tests.Architecture
          --no-build --configuration Release
