# Release + deploy pipeline — the authoritative full-suite gate and the ONLY
# path to production.
#
# Triggered by pushing a version tag (e.g. git tag v1.4.0 && git push --tags).
#
#   1. verify  — full slow suite (integration + E2E + coverage, Docker-in-CI).
#                This is the authoritative CI gate ADR-016 places at the release
#                boundary (amended 2026-06-20): nothing ships unless it passes.
#   2. release — build plantry-web + plantry-migrator, publish the semver tag
#                family (:1.4.0 :1.4 :1 :latest) to GHCR, mark images public, and
#                attach the self-host compose assets to a GitHub Release.
#   3. deploy  — ssh to the prod host, pull the semver images, run the migrator
#                one-shot, roll the web service, smoke-check /alive. (Folded in
#                from the retired cd.yml — deploy is now release-gated, keyed on
#                the semver version rather than the commit SHA, not per-merge.)
#
# Required GitHub Actions secrets (repository or environment level):
#   DEPLOY_SSH_KEY — PEM private SSH key whose public half is in the deploy host's
#                    ~/.ssh/authorized_keys
#   DEPLOY_HOST    — SSH target hostname/IP of the production server
#   DEPLOY_USER    — SSH username on the production server (e.g. plantry)
#   DEPLOY_DOMAIN  — public TLS domain served by Caddy (e.g. plantry.example.com),
#                    used for the post-deploy smoke check at https://<domain>/alive
# GHCR is authenticated via the built-in GITHUB_TOKEN (write:packages granted
# automatically). The prod compose file must exist at ~/plantry/docker-compose.prod.yml
# and the .env at ~/plantry/.env. See docs/Operations/deployment.md.
#
# Tag format: v<major>.<minor>.<patch> (e.g. v1.4.0). The leading "v" is stripped
# before tagging images (images use 1.4.0, not v1.4.0).

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  # ── Stage 1: Full-suite gate (integration + E2E + coverage) ──────────────────
  # The slow suite that used to run on every CI run now runs once here, gating
  # the release (and therefore prod). Docker is pre-installed on ubuntu-latest;
  # the integration + E2E fixtures manage their own Postgres via Testcontainers/
  # Aspire. A red verify blocks the build, publish, and deploy below.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Install Playwright's Chromium + system deps (CLI ships beside the E2E binaries).
      - name: Install Playwright browsers
        run: >
          pwsh tests/Plantry.Tests.E2E/bin/Release/net10.0/playwright.ps1
          install chromium --with-deps

      # ── L1: Domain unit tests (included so the coverage gate sees domain code) ─
      - name: Unit tests
        run: >
          dotnet test tests/Plantry.Tests.Unit
          --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/unit
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[Plantry.Web]*,[Plantry.AppHost]*,[Plantry.ServiceDefaults]*,[Plantry.Migrator]*"

      # ── L3: Integration tests (Testcontainers; self-managed Postgres) ─────────
      - name: Integration tests
        run: >
          dotnet test tests/Plantry.Tests.Integration
          --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/integration
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[Plantry.Web]*,[Plantry.AppHost]*,[Plantry.ServiceDefaults]*,[Plantry.Migrator]*"

      # ── L5: E2E tests (Aspire boots full stack; Playwright drives browser) ────
      - name: E2E tests
        run: >
          dotnet test tests/Plantry.Tests.E2E
          --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/e2e
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[Plantry.Web]*,[Plantry.AppHost]*,[Plantry.ServiceDefaults]*,[Plantry.Migrator]*"

      # Upload Playwright traces on failure so failures can be diagnosed.
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: "**/trace.zip"
          retention-days: 7

      # ── Coverage gate (unit + integration + E2E combined) ─────────────────────
      - name: Coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "coverage/**/*.xml"
          targetdir: "coverage/report"
          reporttypes: "HtmlInline;Cobertura"

      - name: Check coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/report/Cobertura.xml
          badge: false
          thresholds: "70 85"   # warn at 70%, fail at 85% for domain projects
          fail_below_min: true

  # ── Stage 2: Build + publish semver images and the GitHub Release ────────────
  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub Release and upload assets
      packages: write      # push images to GHCR
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      # ── Derive semver components ──────────────────────────────────────────
      # github.ref_name is the tag name (e.g. v1.4.0). Strip the leading "v" to
      # get the bare version (1.4.0), then split into major (1) and minor (1.4)
      # for the floating tag family.
      - name: Derive version tags
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"                # v1.4.0
          VERSION="${TAG#v}"                      # 1.4.0
          MAJOR="${VERSION%%.*}"                  # 1
          MINOR="${VERSION%.*}"                   # 1.4
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"     >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build and push plantry-web ────────────────────────────────────────
      # Tags: :1.4.0  :1.4  :1  :latest
      - name: Build and push plantry-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plantry/web:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/plantry/web:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository_owner }}/plantry/web:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository_owner }}/plantry/web:latest
          # Warm cache from the latest image (avoid a full cold build on each release).
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/plantry/web:latest
          cache-to: type=inline

      # ── Build and push plantry-migrator ──────────────────────────────────
      - name: Build and push plantry-migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Plantry.Migrator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plantry/migrator:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/plantry/migrator:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository_owner }}/plantry/migrator:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository_owner }}/plantry/migrator:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/plantry/migrator:latest
          cache-to: type=inline

      # ── Mark packages public ──────────────────────────────────────────────
      # When the repository is already public, make the packages visible without
      # a pull token so self-hosters can `docker compose pull` without logging in.
      # If the repo is private (pre-publish-flip) the API returns 403 — tolerated.
      - name: Make packages public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGES=("plantry%2Fweb" "plantry%2Fmigrator")

          # Determine if this is a user or org namespace.
          OWNER_TYPE=$(gh api "/users/${OWNER}" --jq '.type' 2>/dev/null || echo "User")
          if [ "$OWNER_TYPE" = "Organization" ]; then
            API_NS="orgs/${OWNER}"
          else
            API_NS="users/${OWNER}"
          fi

          for PKG in "${PACKAGES[@]}"; do
            echo "==> Setting ${PKG} to public..."
            gh api \
              --method PATCH \
              "/${API_NS}/packages/container/${PKG}" \
              -f visibility=public \
              --silent \
              || echo "    NOTE: visibility update returned non-zero (may be a private repo — this is expected pre-publish-flip)"
          done

      # ── Package self-host release assets ─────────────────────────────────
      - name: Bundle self-host assets
        run: |
          mkdir -p /tmp/plantry-selfhost
          cp deploy/docker-compose.yml              /tmp/plantry-selfhost/docker-compose.yml
          cp deploy/docker-compose.caddy.yml        /tmp/plantry-selfhost/docker-compose.caddy.yml
          cp deploy/docker-compose.observability.yml /tmp/plantry-selfhost/docker-compose.observability.yml
          cp deploy/.env.example                    /tmp/plantry-selfhost/.env.example
          cd /tmp
          zip -r "plantry-selfhost-${{ steps.version.outputs.version }}.zip" plantry-selfhost/
          echo "ASSET_ZIP=/tmp/plantry-selfhost-${{ steps.version.outputs.version }}.zip" >> "$GITHUB_ENV"

      # ── Create GitHub Release ─────────────────────────────────────────────
      # Creates a draft release so the operator can add release notes before
      # publishing. Change `draft: true` to `draft: false` once changelog
      # discipline is in place (tracked in plantry-wzz6.11 — OSS publish prep).
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: "Plantry ${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            ${{ env.ASSET_ZIP }}
            deploy/docker-compose.yml
            deploy/docker-compose.caddy.yml
            deploy/docker-compose.observability.yml
            deploy/.env.example

  # ── Stage 3: Deploy to the production host (folded in from the retired cd.yml) ─
  # Pulls the exact semver images verified + published above and rolls prod.
  # The migrator one-shot is the critical gate: a non-zero exit leaves the old
  # web container running and fails the workflow — the old version keeps serving.
  #
  # GATED: this push-based SSH deploy only runs when the repository variable
  # DEPLOY_ENABLED is set to "true" (Settings → Secrets and variables → Actions
  # → Variables). Left unset, tag pushes build + publish images and skip this
  # job cleanly — the model for pull-based hosts (homelab: `docker compose pull
  # && up -d` on the box itself). Enable it, along with the DEPLOY_* secrets,
  # once a runner-reachable web host with a public TLS domain exists.
  deploy:
    needs: release
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Configure a "production" GitHub environment (with deployment protection
    # rules) to add a manual approval gate before any production deploy.
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            VERSION="${{ needs.release.outputs.version }}"
            COMPOSE_DIR=~/plantry
            COMPOSE_FILE="$COMPOSE_DIR/docker-compose.prod.yml"

            echo "==> Deploying version $VERSION"
            cd "$COMPOSE_DIR"

            # Export the exact semver image tags so Compose uses the released images.
            export PLANTRY_WEB_IMAGE="ghcr.io/${{ github.repository_owner }}/plantry/web:$VERSION"
            export MIGRATOR_IMAGE="ghcr.io/${{ github.repository_owner }}/plantry/migrator:$VERSION"

            # 1. Pull both images (fails loud if the registry is unreachable or
            #    the images don't exist — deploy aborts before touching anything).
            echo "==> Pulling images"
            docker compose -f "$COMPOSE_FILE" pull plantry-web migrator

            # 2. Run migrations (one-shot, fails loud). On non-zero exit the script
            #    aborts here (set -e); the old web container keeps serving.
            echo "==> Running migrator"
            docker compose -f "$COMPOSE_FILE" run --rm migrator

            # 3. Roll the web service (and Caddy, so Caddyfile changes take effect).
            echo "==> Starting updated services"
            docker compose -f "$COMPOSE_FILE" up -d plantry-web caddy

            echo "==> Deploy complete, running smoke check"

      # Smoke check runs from the Actions runner so it validates external
      # reachability, not just localhost. Retries up to 5× with 10s delays.
      - name: Smoke check /alive
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          # Use DEPLOY_DOMAIN (public TLS hostname Caddy serves), not DEPLOY_HOST.
          HOST="${{ secrets.DEPLOY_DOMAIN }}"
          URL="https://${HOST}/alive"

          echo "==> Smoke-checking $URL (version $VERSION)"

          for attempt in 1 2 3 4 5; do
            echo "  Attempt $attempt/5..."
            if curl --fail --silent --show-error --max-time 10 "$URL"; then
              echo ""
              echo "==> Smoke check passed"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "  Not ready yet, waiting 10s..."
              sleep 10
            fi
          done

          echo "ERROR: smoke check failed after 5 attempts — $URL did not return 2xx"
          exit 1

      # /ready validates DB connectivity from the new container — a deploy where the container
      # cannot reach the DB fails loudly here rather than silently serving 503s.
      # Informational probe: /ready returns "Healthy"/"Unhealthy" text (no per-check detail).
      - name: Smoke check /ready
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          HOST="${{ secrets.DEPLOY_DOMAIN }}"
          URL="https://${HOST}/ready"

          echo "==> Smoke-checking DB readiness at $URL (version $VERSION)"

          for attempt in 1 2 3 4 5; do
            echo "  Attempt $attempt/5..."
            if curl --fail --silent --show-error --max-time 10 "$URL"; then
              echo ""
              echo "==> Readiness check passed"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "  Not ready yet, waiting 10s..."
              sleep 10
            fi
          done

          echo "ERROR: readiness check failed after 5 attempts — $URL did not return 2xx (DB unreachable)"
          exit 1
